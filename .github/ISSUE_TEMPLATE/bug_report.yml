name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: module config (remove sensitive values)
      render: hcl
  - type: textarea
    id: error
    attributes:
      label: Error Output
      render: shell
  - type: input
    id: version
    attributes:
      label: Module Version
      placeholder: "v1.0.0"
    validations:
      required: true
